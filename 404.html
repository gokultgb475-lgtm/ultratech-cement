<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      (function () {
        const locationData = window.location;
        const segments = locationData.pathname.split('/').filter(Boolean);
        const repo = segments[0];

        if (!repo) {
          return;
        }

        const routeSegments = segments.slice(1);
        const normalizedSegments = routeSegments[0] === 'docs' ? routeSegments.slice(1) : routeSegments;
        const routePath = normalizedSegments.join('/').replace(/&/g, '~and~');
        const query = locationData.search
          ? `&${locationData.search.slice(1).replace(/&/g, '~and~')}`
          : '';

        locationData.replace(
          `${locationData.origin}/${repo}/docs/?/${routePath}${query}${locationData.hash}`,
        );
      })();
    </script>
  </head>
  <body></body>
</html>
