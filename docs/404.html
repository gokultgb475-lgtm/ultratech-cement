<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      (function () {
        const locationData = window.location;
        const pathSegmentsToKeep = locationData.hostname.endsWith('.github.io') ? 1 : 0;
        const basePath = locationData.pathname
          .split('/')
          .slice(0, 1 + pathSegmentsToKeep)
          .join('/');
        const routePath = locationData.pathname
          .slice(1)
          .split('/')
          .slice(pathSegmentsToKeep)
          .join('/')
          .replace(/&/g, '~and~');
        const query = locationData.search
          ? `&${locationData.search.slice(1).replace(/&/g, '~and~')}`
          : '';

        locationData.replace(
          `${locationData.protocol}//${locationData.hostname}${locationData.port ? `:${locationData.port}` : ''}${basePath}/?/${routePath}${query}${locationData.hash}`,
        );
      })();
    </script>
  </head>
  <body></body>
</html>
