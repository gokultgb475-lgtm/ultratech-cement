      (function (location) {
        if (!location.hostname.endsWith('.github.io')) {
          return;
        }

        const segments = location.pathname.split('/').filter(Boolean);
        const repo = segments[0];
        const remainder = segments.slice(1).join('/');

        if (!repo) {
          return;
        }

        if (remainder === '' || remainder === 'index.html') {
          location.replace(`${location.origin}/${repo}/docs/${location.search}${location.hash}`);
        }
      })(window.location);

        const decoded = location.search

          .split('&')
          .map((segment) => segment.replace(/~and~/g, '&'))
          .join('?');

        window.history.replaceState(
          null,
          '',
          location.pathname.slice(0, -1) + decoded + location.hash,
        );
